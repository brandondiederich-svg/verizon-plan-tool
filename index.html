<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verizon Plan Advisor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

h2 { text-align: center; }

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border: none;
  border-radius: 12px;
  background: #e60000;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.small-btn {
  background: #333;
}

.topbar {
  text-align: right;
  margin-bottom: 10px;
}

.startover {
  background: #555;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}

.hidden { display:none; }

.expand {
  color: #ccc;
  font-size: 13px;
  margin-top: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="startover" onclick="restart()">Start Over</span>
</div>

<h2>Plan Advisor</h2>

<div id="step1" class="card">
  <h3>Customer Type</h3>
  <button onclick="existing()">Existing</button>
  <button onclick="next('step2')">New</button>
</div>

<div id="step2" class="card hidden">
  <h3>How many phones?</h3>
  <div class="grid">
    <button onclick="setPhones(1)">1</button>
    <button onclick="setPhones(2)">2</button>
    <button onclick="setPhones(3)">3</button>
    <button onclick="setPhones(4)">4</button>
  </div>
  <br>
  <input id="customPhones" placeholder="More than 4..." type="number">
  <button onclick="useCustom()">Continue</button>
</div>

<div id="step3" class="card hidden"></div>
<div id="step4" class="card hidden"></div>
<div id="step5" class="card hidden"></div>
<div id="results" class="card hidden"></div>

<script>

let lines = [];
let tablets = 0;
let watches = 0;
  
function restart(){
  location.reload();
}

function existing(){
  alert("Use OMNI to determine plan fit.");
}

function next(id){
  document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setPhones(num){
  lines = new Array(num);
  buildDevices();;
}

  function buildDevices(){
  let html = `
    <h3>Connected Devices</h3>

    Tablets:
    <div class="grid">
      <button onclick="setTablets(0)">0</button>
      <button onclick="setTablets(1)">1</button>
      <button onclick="setTablets(2)">2</button>
    </div>

    Watches:
    <div class="grid">
      <button onclick="setWatches(0)">0</button>
      <button onclick="setWatches(1)">1</button>
      <button onclick="setWatches(2)">2</button>
    </div>

    <button onclick="buildNames(lines.length)">Continue</button>
  `;

  document.getElementById("step3").innerHTML = html;
  next("step3");
}

function setTablets(n){ tablets=n; }
function setWatches(n){ watches=n; }
  
function useCustom(){
  let num = document.getElementById("customPhones").value;
  if(num > 0) buildNames(num);
}

function buildNames(count){
  lines = [];
  let html = "<h3>Name Each Line</h3>";

  for(let i=0;i<count;i++){
    html += `<input placeholder="Line ${i+1} name" onchange="lines[${i}]={name:this.value}">`;
  }

  html += `<button onclick="buildHotspot()">Continue</button>`;
  document.getElementById("step3").innerHTML = html;
  next("step3");
}

function buildHotspot(){
  let html = "<h3>Hotspot Usage</h3>";

  lines.forEach((l,i)=>{
    html += `<div class="card">${l.name}<div class="grid">
      <button onclick="setHS(${i},0)">None</button>
      <button onclick="setHS(${i},10)"><10GB</button>
      <button onclick="setHS(${i},20)"><20GB</button>
      <button onclick="setHS(${i},100)"><100GB</button>
      <button onclick="setHS(${i},200)"><200GB</button>
      <button onclick="setHS(${i},300)">200GB+</button>
    </div></div>`;
  });

  html += `<button onclick="buildTravel()">Continue</button>`;
  document.getElementById("step4").innerHTML = html;
  next("step4");
}

function setHS(i,val){
  lines[i].hotspot = val;
}

function buildTravel(){
  let html = `<h3>International Travel</h3>
  <small>Mexico & Canada are included on all plans.</small>`;

  lines.forEach((l,i)=>{
    html += `<div class="card">${l.name}<div class="grid">
      <button onclick="setTravel(${i},0)">Not Needed</button>
      <button onclick="setTravel(${i},1)">Few Years</button>
      <button onclick="setTravel(${i},2)">Yearly+</button>
    </div></div>`;
  });

  html += `<button onclick="calculate()">Get Results</button>`;
  document.getElementById("step5").innerHTML = html;
  next("step5");
}

function setTravel(i,val){
  lines[i].travel = val;
}

function calcLine(line, type){

  if(type === "simplicity"){
    return {
      cost: 30,
      base: 30,
      hs: 0,
      travel: 0,
      plan: "Simplicity",
      notes: "Includes 10GB hotspot, UWB, autopay + switching discount applied"
    };
  }

  let base = 65;
  if(type==="plus") base+=15;
  if(type==="ultimate") base+=30;

  let hs = line.hotspot <=20 ? 0 :
           line.hotspot<=100 ? 10 : 20;

  let travel = 0;
  if(line.travel>0 && type!=="ultimate") travel = 10;

  return {
    cost: base+hs+travel,
    base,
    hs,
    travel,
    plan: type
  };
}

function calculate(){
  let cheapestTotal=0;
  let bestTotal=0;

  let html="<h3>Results</h3>";

  lines.forEach((l,i)=>{

    let s = calcLine(l,"simplicity");
    let w = calcLine(l,"welcome");
    let p = calcLine(l,"plus");
    let u = calcLine(l,"ultimate");
    
    // Cheapest = true lowest
    let cheapest = [s,w,p,u].reduce((a,b)=>a.cost<b.cost?a:b);
    
    // Best Fit logic (you can refine later)
    let best =
      (l.travel===2 || l.hotspot>100) ? u :
      (l.hotspot>20) ? p :
      (l.hotspot<=10 && l.travel===0) ? s :
      w;
    ``

    cheapestTotal+=cheapest.cost;
    bestTotal+=best.cost;

    let tabletCost = tablets * 10;
    let watchCost = watches * 15;
    
    // Simplicity discount (50% off)
    let simplicityDeviceDiscount = 0;
    
    // check if ANY line is simplicity (simple version for now)
    let hasSimplicity = lines.some(l => true); // temp (we'll refine later)
    
    if(hasSimplicity){
      tabletCost *= 0.5;
      watchCost *= 0.5;
    }
    
    html += `
      <h3>Connected Devices</h3>
      Tablets: $${tabletCost}<br>
      Watches: $${watchCost}<br>
    `;
    
    cheapestTotal += tabletCost + watchCost;
    bestTotal += tabletCost + watchCost;
    ``
    
    html+=`
      <div class="card">
        <b>${l.name}</b><br>

        Cheapest: $${cheapest.cost}
        <div class="expand" onclick="toggle('c${i}')">Details</div>
        <div id="c${i}" class="hidden">
          Base: $${cheapest.base}<br>
          Hotspot: $${cheapest.hs}<br>
          Travel: $${cheapest.travel}
        </div>

        <br>

        Best Fit: $${best.cost}
        <div class="expand" onclick="toggle('b${i}')">Details</div>
        <div id="b${i}" class="hidden">
          Base: $${best.base}<br>
          Hotspot: $${best.hs}<br>
          Travel: $${best.travel}
        </div>
      </div>
    `;
  });

  html+=`
    <h3>Totals</h3>
    Cheapest: $${cheapestTotal}<br>
    Best Fit: $${bestTotal}
  `;

  document.getElementById("results").innerHTML=html;
  next("results");
}

function toggle(id){
  let el=document.getElementById(id);
  el.classList.toggle("hidden");
}

</script>

</body>
</html>
