<!DOCTYPE html>
<html>
<head>
  <title>Plan Calculator Test</title>
</head>
<body>

<h2>Verizon Plan Calculator</h2>

<label>Number of Phones:</label>
<input type="number" id="phones" value="1"><br><br>

<label>Hotspot Usage (GB):</label>
<input type="number" id="hotspot" value="50"><br><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script>
function calculate() {
  let phones = parseInt(document.getElementById("phones").value);
  let hotspot = parseInt(document.getElementById("hotspot").value);

  let welcomePlan = phones >= 4 ? 30 : [0,65,55,40][phones];
  let welcomeHS = hotspot === 0 ? 0 : (hotspot <= 100 ? 10 : 20);
  let welcomeCost = welcomePlan + welcomeHS;

  let plusCost = welcomeCost + 15;
  let ultimateCost = plusCost + 15;

  let best = Math.min(welcomeCost, plusCost, ultimateCost);

  let plan = best === welcomeCost ? "Welcome"
            : best === plusCost ? "Plus"
            : "Ultimate";

  document.getElementById("result").innerText =
    `Best Plan: ${plan} ($${best}/mo)`;
}
</script>

</body>
</html>
